name: Build WDR Windows EXE

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install PyInstaller
      run: pip install pyinstaller

    - name: Build EXE
      run: pyinstaller --onefile --noconsole --name WDR_LauraD wdr_server.py

    - name: Upload EXE as artifact
      uses: actions/upload-artifact@v4
      with:
        name: WDR_LauraD_Windows
        path: dist/WDR_LauraD.exe
